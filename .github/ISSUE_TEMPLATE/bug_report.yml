name: Bug Report
description: File a report to help us improve.
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: input
    id: glpi-version
    attributes:
      label: GLPI Version
      placeholder: e.g. 11.0.0
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: e.g. 8.3.4
    validations:
      required: false
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Edge
        - Safari
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce the behavior.
      placeholder: |
        1. Open a Ticket form...
        2. Press Ctrl + S...
        3. See the error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug Logs / Console Output
      description: Attach browser console errors or GLPI php-errors.log entries.
      render: shell
